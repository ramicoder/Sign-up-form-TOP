<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
    <div class="left-side-screen">
        <div class="left-side-container">
            <div class="logo-background">
            <img class="logo" src="Fitleads.png" alt="Logo of a social media marketing agency for fitness centers called 'FitLeads'">
            <p class="logo-descript">For Gyms and Fitness Centers</p>
            </div>    
        
            <p class="citation">
            Photo by <a href="https://unsplash.com/@brett_jordan?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Brett Jordan</a> on <a href="https://unsplash.com/photos/exercise-equipments-in-grayscale-photography-U2q73PfHFpM?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </p>
        </div>
      
    </div>

    <div class="right-side-screen">
        <div class="paragraph-container">
            <div class="paragraph">
                <p>FitLeads Media is a professional social media agency run by fitness enthusiasts. We help gyms grow memberships through proven strategies in content, ads, and lead generation</p>
                <p style="font-style: italic;">- FitLeads Media</p>
            </div>
        </div>
        <div class="form">
            <p>Get New Memberships</p>
            <form action="">
                <div class="name">
                    <label for="fname">First name:</label>
                    <input type="text" id="fname" name="fname">
                </div>
                <div class="name">
                    <label for="lname">Last name:</label>
                    <input type="text" id="lname" name="lname">
                </div>
            </form>
        </div>
        <div>
            <button></button>
            <p></p>
        </div>
    </div>
</body>

</html>
